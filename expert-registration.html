<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Expert Registration - SkillSwap</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#09090b;
--primary:#6366f1;
--accent:#a855f7;
--border:rgba(255,255,255,0.08);
--muted:#a1a1aa;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:50px 20px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid var(--border);
border-radius:20px;
padding:40px;
}

h1{
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group.full{
grid-column:1/-1;
}

label{
margin-bottom:6px;
font-size:0.9rem;
color:var(--muted);
}

input,textarea,select{
padding:14px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(0,0,0,0.3);
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
font-weight:600;
cursor:pointer;
}

@media(max-width:768px){
.form-grid{grid-template-columns:1fr;}
}
</style>

<style id="mob">
.mobile-back-btn{display:none;position:fixed;top:16px;left:16px;z-index:9999;width:44px;height:44px;background:rgba(9,9,11,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:1.1rem;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(10px);text-decoration:none;transition:background 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.mobile-back-btn:hover{background:rgba(99,102,241,0.3);}
@media(max-width:768px){
.mobile-back-btn{display:flex;}
.container{padding:70px 14px 30px;}
.card{padding:24px 16px;}
h1{font-size:1.4rem;}
.form-grid{grid-template-columns:1fr !important;}
input,textarea,select{font-size:16px !important;}
button{padding:16px;}
}
</style>
<style id="ss-universal-responsive">
/* ══════════════════════════════════════════
   UNIVERSAL RESPONSIVE FIXES — SkillSwap
   Applied to all pages for consistent UX
══════════════════════════════════════════ */

/* Safe area support */
:root {
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
}

/* Remove legacy floating back buttons */
.mobile-back-btn { display: none !important; }

/* ── Smooth scrolling & selection ── */
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

/* ── Universal input fixes for mobile ── */
input, textarea, select {
  font-size: 16px !important; /* Prevents iOS zoom */
  -webkit-appearance: none;
  border-radius: 10px;
}

/* ── Focus ring ── */
input:focus, textarea:focus, select:focus, button:focus-visible {
  outline: none;
}

/* ── Prevent horizontal overflow ── */
body { overflow-x: hidden; }
img, video { max-width: 100%; }

/* ── Universal Bottom Nav (shown on mobile for app pages) ── */
.ss-mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(9,9,11,0.97);
  border-top: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 10px 4px;
  padding-bottom: calc(10px + var(--sab));
  z-index: 500;
}
.ss-mobile-nav-inner {
  display: flex;
  justify-content: space-around;
  align-items: center;
  max-width: 480px;
  margin: 0 auto;
}
.ss-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  color: #71717a;
  font-size: 0.62rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 12px;
  transition: color 0.2s, background 0.2s;
  text-decoration: none;
  min-width: 52px;
  text-align: center;
  letter-spacing: 0.02em;
}
.ss-nav-item i { font-size: 1.2rem; }
.ss-nav-item.active { color: #6366f1; }
.ss-nav-item.active i { color: #6366f1; }

/* ── Universal Mobile Header ── */
.ss-mobile-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 400;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  padding-top: calc(14px + var(--sat));
  background: rgba(9,9,11,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.ss-mob-logo {
  font-weight: 800;
  font-size: 1.1rem;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: flex; align-items: center; gap: 8px;
}
.ss-mob-btn {
  width: 40px; height: 40px;
  border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.09);
  background: rgba(255,255,255,0.04);
  color: #a1a1aa;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem;
  text-decoration: none; transition: background 0.2s;
}
.ss-mob-btn:hover { background: rgba(99,102,241,0.2); color: #a5b4fc; }

@media (max-width: 768px) {
  .ss-mobile-nav { display: block; }
  .ss-mobile-header { display: flex; }

  /* Extra bottom padding so content not hidden behind nav */
  body { padding-bottom: calc(70px + var(--sab)) !important; }

  /* Hide desktop sidebars on mobile */
  .sidebar { transform: translateX(-100%) !important; }
  .sidebar.open { transform: translateX(0) !important; }
  .main { margin-left: 0 !important; }

  /* Bigger tap targets */
  button, .btn-primary, .btn-secondary, a[role=button] {
    min-height: 44px;
  }

  /* Container full padding on mobile */
  .container { padding-left: 16px !important; padding-right: 16px !important; }

  /* Card padding on mobile */
  .card, .panel, .settings-card { padding: 18px 16px !important; }
}

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr !important; }
  .stats-row, .stat-row { grid-template-columns: 1fr 1fr !important; }
  h1 { font-size: 1.5rem !important; }
}
</style>
<style id="ss-per-page-responsive">
/* Expert registration mobile */
@media (max-width: 768px) {
  .container { padding-top: 20px !important; }
  .card { padding: 20px 14px !important; border-radius: 16px; }
  .form-grid { gap: 14px !important; }
  h1 { font-size: 1.3rem; }
}
</style>
</head>

<body>


<div class="container">
<div class="card">
<h1>Apply as Verified Expert</h1>

<div class="form-grid">

<div class="input-group">
<label>Full Name</label>
<input id="fullName" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input id="phone" required>
</div>

<div class="input-group">
<label>Primary Skill</label>
<input id="skill" required>
</div>

<div class="input-group">
<label>Category</label>
<select id="category">
<option>Programming</option>
<option>Design</option>
<option>Marketing</option>
<option>Business</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Years of Experience</label>
<input id="experience" type="number" required>
</div>

<div class="input-group">
<label>Hourly Rate (₹)</label>
<input id="rate" type="number" required>
</div>

<div class="input-group full">
<label>Professional Bio</label>
<textarea id="bio"></textarea>
</div>

<div class="input-group">
<label>LinkedIn URL</label>
<input id="linkedin">
</div>

<div class="input-group">
<label>Portfolio URL</label>
<input id="portfolio">
</div>

<div class="input-group full">
<label>Upload Certificate (PDF/Image)</label>
<input type="file" id="certificate" accept=".pdf,.jpg,.png" required>
</div>

<div class="input-group full">
<label>Upload Resume (Optional)</label>
<input type="file" id="resume" accept=".pdf">
</div>

</div>

<button onclick="submitApplication()">Submit Application</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,addDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

 const firebaseConfig = {
            apiKey: "AIzaSyCz52XxqRB2IKCxwqm5duKJsQ2uEMs8ans",
            authDomain: "skillswapp-35e86.firebaseapp.com",
            projectId: "skillswapp-35e86",
            storageBucket: "skillswapp-35e86.appspot.com",
            messagingSenderId: "668466292157",
            appId: "1:668466292157:web:9be85414fc752b67779ed4"
        };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser;

onAuthStateChanged(auth,user=>{
if(!user){
window.location.href="login.html";
}else{
currentUser=user;
}
});

window.submitApplication = async function(){

const certFile=document.getElementById("certificate").files[0];
const resumeFile=document.getElementById("resume").files[0];

if(!certFile){
alert("Certificate required");
return;
}

try{

// Upload certificate
const certRef=ref(storage,"expertCertificates/"+currentUser.uid+"_"+certFile.name);
await uploadBytes(certRef,certFile);
const certURL=await getDownloadURL(certRef);

let resumeURL="";
if(resumeFile){
const resumeRef=ref(storage,"expertResumes/"+currentUser.uid+"_"+resumeFile.name);
await uploadBytes(resumeRef,resumeFile);
resumeURL=await getDownloadURL(resumeRef);
}

await addDoc(collection(db,"expertApplications"),{
userId:currentUser.uid,
fullName:fullName.value,
phone:phone.value,
skill:skill.value,
category:category.value,
experience:Number(experience.value),
rate:Number(rate.value),
bio:bio.value,
linkedin:linkedin.value,
portfolio:portfolio.value,
certificateURL:certURL,
resumeURL:resumeURL,
status:"pending",
isVerified:false,
appliedAt:serverTimestamp()
});

alert("Application submitted successfully!");

}catch(error){
console.error(error);
alert("Something went wrong.");
}

};
</script>

</body>
</html>
