<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090f">
  <title>SkillSwap — Exchanges</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    /* ═══ TOKENS ═══ */
    :root {
      --bg:      #09090f;
      --s1:      #111118;
      --s2:      #18181f;
      --s3:      #1f1f28;
      --s4:      #26263200;
      --b1:      rgba(255,255,255,.055);
      --b2:      rgba(255,255,255,.1);
      --b3:      rgba(255,255,255,.16);
      --p:       #7c6dff;
      --p2:      #5a4fef;
      --pg:      rgba(124,109,255,.2);
      --pg2:     rgba(124,109,255,.07);
      --tl:      #00d0a8;
      --tlg:     rgba(0,208,168,.1);
      --am:      #ffb931;
      --rd:      #ff4f6b;
      --gn:      #34e08a;
      --tx:      #eaebf5;
      --sub:     #8587a4;
      --mu:      #434460;
      --nb-h:    58px;
      --sab:     env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--tx);
      min-height: 100dvh; overflow-x: hidden; line-height: 1.5;
      padding-bottom: calc(var(--nb-h) + var(--sab) + 10px);
    }

    /* ── BG glow + dots ── */
    .glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70vw 45vh at 15% -8%,   rgba(124,109,255,.08) 0%, transparent 60%),
        radial-gradient(ellipse 55vw 38vh at 92% 100%, rgba(0,208,168,.06)   0%, transparent 55%),
        radial-gradient(ellipse 40vw 30vh at 50%  50%, rgba(124,109,255,.025) 0%, transparent 50%);
    }
    .dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .022;
      background-image: radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    /* ── LAYOUT ── */
    .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 15px 24px; }

    /* ══ TOP APP BAR ══ */
    .appbar {
      position: sticky; top: 0; z-index: 80;
      background: rgba(9,9,15,.88);
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      border-bottom: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 15px 11px;
      margin: 0 -15px;
    }
    .ab-logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none; color: var(--tx);
    }
    .logo-gem {
      width: 33px; height: 33px; border-radius: 9px;
      background: linear-gradient(140deg, var(--p), var(--p2));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; box-shadow: 0 0 16px var(--pg);
    }
    .logo-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -.5px; }
    .logo-name em { font-style: normal; color: var(--p); }

    .ab-right { display: flex; align-items: center; gap: 7px; }
    .ab-icon {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--b2); background: var(--s2);
      color: var(--sub); display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; transition: all .15s;
      text-decoration: none; position: relative; flex-shrink: 0;
    }
    .ab-icon:active { background: var(--s3); color: var(--tx); }
    .notif-dot {
      position: absolute; top: -3px; right: -3px;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--am); color: #000; font-size: 8.5px; font-weight: 900;
      display: none; align-items: center; justify-content: center;
      border: 2px solid var(--bg);
    }
    .notif-dot.on { display: flex; }
    .user-dot {
      width: 32px; height: 32px; border-radius: 50%;
      font-weight: 900; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; border: 2px solid var(--b2);
    }

    /* ══ STATS STRIP ══ */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px;
      padding: 15px 0 5px;
    }
    .stat {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: 14px; padding: 12px 8px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: border-color .18s;
    }
    .stat:active { border-color: var(--b2); }
    .stat-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem; font-weight: 700; line-height: 1;
    }
    .stat-n.c1 { color: var(--p);  }
    .stat-n.c2 { color: var(--tl); }
    .stat-n.c3 { color: var(--am); }
    .stat-n.c4 { color: var(--gn); }
    .stat-l {
      font-size: 9px; color: var(--sub); font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px; text-align: center;
    }

    /* ══ POST FORM (collapsible) ══ */
    .form-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: var(--s1); border: 1px solid var(--b2);
      border-radius: 14px; padding: 13px 15px;
      margin: 14px 0 0; cursor: pointer; transition: all .2s;
      color: var(--tx); font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 700;
    }
    .form-toggle:active { background: var(--s2); }
    .form-toggle.open { border-radius: 14px 14px 0 0; border-bottom-color: transparent; }
    .ft-left { display: flex; align-items: center; gap: 9px; }
    .ft-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--pg2); color: var(--p);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .ft-arr { color: var(--sub); font-size: 11px; transition: transform .25s ease; }
    .ft-arr.r { transform: rotate(180deg); }

    .form-body {
      background: var(--s1); border: 1px solid var(--b2); border-top: none;
      border-radius: 0 0 14px 14px; overflow: hidden;
      max-height: 0; transition: max-height .35s ease, padding .3s ease;
      padding: 0 15px;
    }
    .form-body.open { max-height: 640px; padding: 14px 15px 18px; }

    .fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .9px; color: var(--sub);
    }
    input[type=text], select, textarea {
      background: rgba(0,0,0,.2); border: 1px solid var(--b2);
      color: var(--tx); border-radius: 10px;
      padding: 11px 13px; font-family: 'Outfit', sans-serif; font-size: 15px;
      outline: none; transition: border-color .18s, box-shadow .18s; width: 100%;
      -webkit-appearance: none; appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--p); box-shadow: 0 0 0 3px var(--pg2);
    }
    input::placeholder, textarea::placeholder { color: var(--mu); }
    select option { background: var(--s2); color: var(--tx); }
    textarea { min-height: 70px; resize: vertical; }

    .btn-submit {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--p), var(--p2));
      color: #fff; font-family: 'Outfit', sans-serif; font-weight: 800;
      font-size: 15px; cursor: pointer; gap: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 22px var(--pg); transition: all .15s; margin-top: 4px;
    }
    .btn-submit:active { transform: scale(.97); opacity: .9; }

    /* ══ FILTER PILLS ══ */
    .filters {
      display: flex; gap: 7px; padding: 15px 0 12px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .fpill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 15px; border-radius: 50px; flex-shrink: 0;
      border: 1px solid var(--b2); background: var(--s1);
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
      color: var(--sub); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .fpill.on {
      background: var(--p); color: #fff; border-color: transparent;
      box-shadow: 0 3px 16px var(--pg);
    }
    .fpill .pip { width: 5px; height: 5px; border-radius: 50%; background: var(--gn); display: none; }
    .fpill.on .pip { display: block; }

    /* ══ SEARCH + SORT ══ */
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 13px;
    }
    .search {
      flex: 1; display: flex; align-items: center; gap: 9px;
      background: var(--s1); border: 1px solid var(--b2);
      border-radius: 11px; padding: 10px 13px;
    }
    .search i { color: var(--mu); font-size: 12px; flex-shrink: 0; }
    .search input {
      flex: 1; background: none; border: none; padding: 0;
      font-size: 14px; color: var(--tx); outline: none; font-family: 'Outfit', sans-serif;
      box-shadow: none;
    }
    .search input::placeholder { color: var(--mu); }
    .sort-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--s1); border: 1px solid var(--b2);
      color: var(--sub); font-family: 'Outfit', sans-serif;
      font-size: 11.5px; font-weight: 700;
      padding: 0 12px; border-radius: 11px; cursor: pointer;
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .sort-btn:active { background: var(--s2); }

    .list-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 11px;
    }
    .lh-title { font-size: 12.5px; font-weight: 800; display: flex; align-items: center; gap: 7px; }
    .cnt-badge {
      font-size: 10.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      background: var(--s2); border: 1px solid var(--b1);
      color: var(--sub); padding: 1px 8px; border-radius: 20px;
    }

    /* ══ CARDS ══ */
    .card-feed { display: flex; flex-direction: column; gap: 11px; }

    .xcard {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: 18px; padding: 15px 15px 14px;
      display: flex; flex-direction: column; position: relative; overflow: hidden;
      animation: riseUp .28s ease both;
      transition: border-color .2s, box-shadow .2s;
    }
    .xcard:active { transform: scale(.997); }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .xcard:nth-child(1){animation-delay:.03s} .xcard:nth-child(2){animation-delay:.06s}
    .xcard:nth-child(3){animation-delay:.09s} .xcard:nth-child(4){animation-delay:.12s}
    .xcard:nth-child(5){animation-delay:.15s} .xcard:nth-child(6){animation-delay:.18s}

    /* accent top line */
    .xcard::before {
      content: ''; position: absolute; top: 0; left: 16px; right: 16px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--b3), transparent);
      border-radius: 0 0 2px 2px;
    }
    .xcard.match::before { background: linear-gradient(90deg, transparent 5%, var(--tl) 50%, transparent 95%); }
    .xcard.own::before   { background: linear-gradient(90deg, transparent 5%, var(--p)  50%, transparent 95%); }
    .xcard.saved { border-color: rgba(255,185,49,.14); }
    .xcard.match { border-color: rgba(0,208,168,.16); background: linear-gradient(165deg, rgba(0,208,168,.02) 0%, var(--s1) 45%); }
    .xcard.own   { border-color: rgba(124,109,255,.18); }

    /* card header */
    .ck-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 12px;
    }
    .ck-who { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .ck-av {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 17px;
    }
    .ck-info { min-width: 0; }
    .ck-name {
      font-weight: 800; font-size: 14.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
    }
    .ck-time { font-size: 10.5px; color: var(--mu); margin-top: 2px; }

    .ck-badges { display: flex; align-items: center; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      font-size: 10.5px; font-weight: 800; padding: 3px 8px; border-radius: 20px;
      display: flex; align-items: center; gap: 3px;
    }
    .bg-beg  { background: rgba(84,160,255,.1);  color: #54a0ff; border: 1px solid rgba(84,160,255,.2);  }
    .bg-int  { background: rgba(167,139,250,.1); color: #a78bfa; border: 1px solid rgba(167,139,250,.2); }
    .bg-exp  { background: rgba(52,224,138,.1);  color: var(--gn); border: 1px solid rgba(52,224,138,.2); }
    .bg-mat  { background: var(--tlg); color: var(--tl); border: 1px solid rgba(0,208,168,.2); }

    .bk-btn {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--b2);
      background: var(--s2); color: var(--mu);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11.5px; transition: all .14s; flex-shrink: 0;
    }
    .bk-btn:active { transform: scale(.87); }
    .bk-btn.on { color: var(--am); border-color: rgba(255,185,49,.35); background: rgba(255,185,49,.09); }

    /* skill rows */
    .ck-skills {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 11px;
    }
    .ck-sk {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: 10px; padding: 8px 10px;
      display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    .sk-ico {
      width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 9px;
    }
    .sk-ico.t { background: var(--pg2); color: var(--p); }
    .sk-ico.w { background: var(--tlg); color: var(--tl); }
    .sk-text { min-width: 0; overflow: hidden; }
    .sk-lbl { font-size: 9px; color: var(--sub); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
    .sk-val { font-size: 13px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* desc */
    .ck-desc {
      font-size: 12.5px; color: var(--sub); line-height: 1.55; margin-bottom: 10px; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .ck-desc.no-desc { font-style: italic; opacity: .3; }

    .ck-meta {
      display: flex; gap: 10px; font-size: 10.5px; color: var(--mu);
      margin-bottom: 11px;
    }
    .ck-meta span { display: flex; align-items: center; gap: 4px; }

    /* footer buttons */
    .ck-foot { display: flex; gap: 7px; }
    .btn-main {
      flex: 1; padding: 11px 12px; border-radius: 10px; border: none;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 13.5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: all .15s;
    }
    .btn-main.req  { background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff; box-shadow: 0 3px 14px var(--pg); }
    .btn-main.mat  { background: linear-gradient(135deg, #009b78, var(--tl)); color: #fff; box-shadow: 0 3px 14px var(--tlg); }
    .btn-main.own  { background: var(--pg2); border: 1px solid rgba(124,109,255,.25); color: var(--p); cursor: default; }
    .btn-main:active { transform: scale(.96); }
    .btn-main.own:active { transform: none; }

    .ib {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      border: 1px solid var(--b2); background: var(--s2); color: var(--sub);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; transition: all .14s;
    }
    .ib:active { background: var(--s3); color: var(--tx); }
    .ib.del:active { color: var(--rd); border-color: rgba(255,79,107,.3); background: rgba(255,79,107,.07); }

    /* ── SKELETON ── */
    .skel {
      border-radius: 18px; height: 190px;
      background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%);
      background-size: 400% 100%; animation: shim 1.4s infinite;
    }
    @keyframes shim { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

    /* ── EMPTY ── */
    .empty {
      text-align: center; padding: 56px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 11px;
    }
    .empty-box {
      width: 70px; height: 70px; border-radius: 20px;
      background: var(--s2); border: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 4px;
    }
    .empty h3 { font-size: 1rem; font-weight: 900; }
    .empty p  { color: var(--sub); font-size: 13px; max-width: 250px; line-height: 1.6; }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 70;
      height: calc(var(--nb-h) + var(--sab));
      padding-bottom: var(--sab);
      background: rgba(9,9,15,.9);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-top: 1px solid var(--b1);
      display: flex; align-items: stretch;
    }
    .bn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; cursor: pointer;
      color: var(--mu); font-size: 9.5px; font-weight: 700;
      text-decoration: none; transition: color .14s; padding: 6px 0;
      letter-spacing: .3px;
    }
    .bn.active { color: var(--p); }
    .bn-ico-wrap { position: relative; }
    .bn i { font-size: 19px; }
    .bn-badge {
      position: absolute; top: -3px; right: -6px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--am); border: 2px solid var(--bg); display: none;
    }
    .bn-badge.on { display: block; }

    /* FAB */
    .fab {
      position: fixed; right: 18px;
      bottom: calc(var(--nb-h) + var(--sab) + 14px);
      z-index: 69;
      width: 54px; height: 54px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--p), var(--p2));
      color: #fff; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 26px var(--pg); cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .fab:active { transform: scale(.89); box-shadow: 0 3px 12px var(--pg); }

    /* ══ BOTTOM SHEET ══ */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .sheet {
      width: 100%; max-width: 640px;
      max-height: 92dvh; overflow-y: auto;
      background: var(--s1); border-radius: 22px 22px 0 0;
      border: 1px solid var(--b2); border-bottom: none;
      padding: 0 18px calc(18px + var(--sab));
      animation: sheetUp .3s cubic-bezier(.32,.72,0,1);
    }
    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .sh-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--b3); margin: 10px auto 16px; cursor: pointer;
    }
    .sh-title {
      font-size: 1.05rem; font-weight: 900; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .sh-close {
      margin-left: auto; width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid var(--b1); background: var(--s2); color: var(--sub);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer;
    }

    .sf { margin-bottom: 13px; }
    .sf label {
      display: block; font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .9px; color: var(--sub); margin-bottom: 6px;
    }
    .sf2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 13px; }
    .sf2 .sf { margin-bottom: 0; }

    .sh-btns { display: flex; gap: 9px; margin-top: 6px; }
    .sbtn {
      flex: 1; padding: 13px; border-radius: 11px;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 14.5px;
      cursor: pointer; transition: all .14s; border: none;
    }
    .sbtn.cancel { background: var(--s2); border: 1px solid var(--b2); color: var(--sub); }
    .sbtn.ok     { background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff; }
    .sbtn.ok:active { transform: scale(.97); opacity: .9; }

    /* profile sheet specific */
    .pv-hero { text-align: center; padding-bottom: 6px; }
    .pv-av {
      width: 76px; height: 76px; border-radius: 20px; font-weight: 900; font-size: 30px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
    }
    .pv-name { font-size: 1.25rem; font-weight: 900; margin-bottom: 4px; }
    .pv-meta { font-size: 12px; color: var(--sub); margin-bottom: 20px; }
    .pv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .pv-box {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 12px 13px;
    }
    .pv-box .lbl { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; color: var(--sub); margin-bottom: 4px; }
    .pv-box .val { font-size: 15px; font-weight: 800; }
    .pv-about {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 12px 13px; margin-bottom: 18px;
    }

    /* ══ TOAST ══ */
    .toast {
      position: fixed; z-index: 999; pointer-events: none;
      left: 14px; right: 14px;
      bottom: calc(var(--nb-h) + var(--sab) + 12px);
      background: var(--s3); border: 1px solid var(--b3);
      color: var(--tx); padding: 12px 15px; border-radius: 14px;
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 32px rgba(0,0,0,.55);
      transform: translateY(14px) scale(.97); opacity: 0;
      transition: all .28s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.on { transform: translateY(0) scale(1); opacity: 1; }
    .t-ico {
      width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 11px;
    }
    .t-ok  { background: rgba(52,224,138,.18); color: var(--gn); }
    .t-err { background: rgba(255,79,107,.15);  color: var(--rd); }
    .t-inf { background: rgba(124,109,255,.15); color: var(--p); }

    /* ════════════════════
       DESKTOP (≥ 680px)
    ════════════════════ */
    @media (min-width: 680px) {
      body { padding-bottom: 0; }
      .wrap { max-width: 1200px; padding: 0 28px 60px; }
      .appbar { margin: 0; border-radius: 0; }
      .bottom-nav { display: none; }
      .fab { display: none; }
      .stats { grid-template-columns: repeat(4,1fr); gap: 14px; padding: 22px 0 8px; }
      .stat { border-radius: 16px; padding: 16px 12px 12px; }
      .stat-n { font-size: 1.75rem; }
      .stat-l { font-size: 11px; }
      .card-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 16px; }
      .xcard { padding: 20px 22px; }
      .xcard:hover { transform: translateY(-3px); box-shadow: 0 14px 38px rgba(0,0,0,.3); }
      .xcard:active { transform: translateY(-3px); }
      .toast { max-width: 340px; left: auto; right: 26px; bottom: 26px; }
      .overlay { align-items: center; }
      .sheet { border-radius: 22px; max-width: 520px; }
    }
  </style>
</head>

<!-- ═══ FIREBASE ═══ -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  query, orderBy, onSnapshot, doc, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyCz52XxqRB2IKCxwqm5duKJsQ2uEMs8ans",
  authDomain:"skillswapp-35e86.firebaseapp.com",
  projectId:"skillswapp-35e86",
  storageBucket:"skillswapp-35e86.appspot.com",
  messagingSenderId:"668466292157",
  appId:"1:668466292157:web:9be85414fc752b67779ed4"
};
const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ── state ── */
let me=null, allEx=[], curTab='matched', sortMode=0, editId=null, profEx=null;
let saved = new Set(JSON.parse(localStorage.getItem('ss_saved')||'[]'));
const SORTS=['Newest','Oldest','A–Z'];

const PALS=[
  ['#7c6dff','#2d2880'],['#5a4fef','#1e1a72'],['#00d0a8','#004a3a'],
  ['#e8418e','#5a0028'],['#ffb931','#5a3800'],['#34e08a','#0a3e20'],
  ['#54a0ff','#0a2255'],['#ff6b81','#440012'],
];
function pal(n){ let h=0; for(const c of(n||'U'))h=(h*37+c.charCodeAt(0))&0x7fffffff; return PALS[h%PALS.length]; }

function ago(ts){
  if(!ts)return'just now';
  const d=ts.toDate?ts.toDate():new Date(ts.seconds?ts.seconds*1000:ts);
  const s=(Date.now()-d.getTime())/1000;
  if(s<60)return'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

function isMatch(ex){
  if(!me||ex.userId===me.uid)return false;
  const mt=allEx.filter(e=>e.userId===me.uid).map(e=>e.teachSkill.toLowerCase());
  const ml=allEx.filter(e=>e.userId===me.uid).map(e=>e.learnSkill.toLowerCase());
  const tw=ex.learnSkill.toLowerCase(),tt=ex.teachSkill.toLowerCase();
  return mt.some(t=>tw.includes(t)||t.includes(tw))||ml.some(l=>tt.includes(l)||l.includes(tt));
}

/* ── form toggle ── */
window.toggleForm=(forceOpen)=>{
  const b=document.getElementById('formBody'), t=document.getElementById('formToggle'), a=document.getElementById('ftArr');
  const open = forceOpen===true ? true : !b.classList.contains('open');
  b.classList.toggle('open',open);
  t.classList.toggle('open',open);
  a.classList.toggle('r',open);
  if(open) setTimeout(()=>{ document.getElementById('teachSkill').focus(); b.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 360);
};

/* ── tabs ── */
window.setTab=(t)=>{
  curTab=t;
  ['m','a','s','p'].forEach(k=>document.getElementById('tab-'+k).classList.remove('on'));
  document.getElementById('tab-'+t[0]).classList.add('on');
  renderNow();
};

/* ── sort ── */
window.cycleSort=()=>{ sortMode=(sortMode+1)%3; document.getElementById('sortLbl').textContent=SORTS[sortMode]; renderNow(); };

/* ── render ── */
window.renderNow=()=>{
  const q=document.getElementById('searchBar').value.toLowerCase().trim();
  let list=[...allEx];
  if(curTab==='matched') list=list.filter(isMatch);
  else if(curTab==='mine')  list=list.filter(e=>me&&e.userId===me.uid);
  else if(curTab==='saved') list=list.filter(e=>saved.has(e.id));
  if(q) list=list.filter(e=>[e.teachSkill,e.learnSkill,e.userName,e.description||''].join(' ').toLowerCase().includes(q));
  if(sortMode===1)list.reverse();
  else if(sortMode===2)list.sort((a,b)=>a.userName.localeCompare(b.userName));

  const nm=me?allEx.filter(e=>e.userId===me.uid).length:0;
  document.getElementById('sAll').textContent  = allEx.length;
  document.getElementById('sMat').textContent  = allEx.filter(isMatch).length;
  document.getElementById('sMine').textContent = nm;
  document.getElementById('sSav').textContent  = saved.size;
  document.getElementById('cnt').textContent   = list.length;
  renderCards(list);
};

function renderCards(list){
  const g=document.getElementById('feed'); g.innerHTML='';
  if(!list.length){
    const M={
      matched:{i:'🎯',h:'No matches yet',p:"Post your skills — we'll find people who complement you."},
      all:    {i:'📋',h:'No exchanges yet',p:'Be the first to post a skill exchange!'},
      saved:  {i:'🔖',h:'Nothing saved yet',p:'Tap the bookmark icon on any card.'},
      mine:   {i:'✍️',h:'No posts yet',p:'Tap + to post your first exchange.'},
    };
    const m=M[curTab]||M.all;
    g.innerHTML=`<div class="empty"><div class="empty-box">${m.i}</div><h3>${m.h}</h3><p>${m.p}</p></div>`;
    return;
  }
  list.forEach(data=>{
    const own=me&&me.uid===data.userId, mat=isMatch(data), sv=saved.has(data.id);
    const[fg,bg]=pal(data.userName), init=(data.userName||'U')[0].toUpperCase();
    const lv=(data.level||'beginner').toLowerCase();
    const lvCls=lv==='expert'?'bg-exp':lv==='intermediate'?'bg-int':'bg-beg';
    const desc=data.description||'';
    let vh=0; for(const c of data.id)vh=(vh*13+c.charCodeAt(0))&0xffff;
    const views=(vh%220)+4;

    let foot;
    if(own){
      foot=`<div class="btn-main own"><i class="fa-solid fa-user-check"></i>Your Post</div>
            <button class="ib" onclick="openEdit('${data.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="ib del" onclick="delPost('${data.id}')"><i class="fa-solid fa-trash"></i></button>`;
    } else {
      foot=`<button class="btn-main ${mat?'mat':'req'}" onclick="reqTrade('${data.id}','${data.userId}')">
              ${mat?'🎯 Perfect Match':'<i class="fa-solid fa-handshake"></i> Request Trade'}
            </button>
            <button class="ib" onclick="openProfile('${data.id}')"><i class="fa-regular fa-user"></i></button>`;
    }

    const el=document.createElement('div');
    el.className=`xcard${mat?' match':''}${own?' own':''}${sv?' saved':''}`;
    el.innerHTML=`
      <div class="ck-top">
        <div class="ck-who">
          <div class="ck-av" style="background:linear-gradient(135deg,${fg},${bg})">${init}</div>
          <div class="ck-info">
            <div class="ck-name">${esc(data.userName)}</div>
            <div class="ck-time">${ago(data.createdAt)}</div>
          </div>
        </div>
        <div class="ck-badges">
          ${mat?`<span class="badge bg-mat"><i class="fa-solid fa-bolt"></i>Match</span>`:''}
          <span class="badge ${lvCls}">${esc(data.level||'Beginner')}</span>
          <button class="bk-btn${sv?' on':''}" onclick="toggleSave('${data.id}',this)">
            <i class="fa-${sv?'solid':'regular'} fa-bookmark"></i>
          </button>
        </div>
      </div>
      <div class="ck-skills">
        <div class="ck-sk">
          <div class="sk-ico t"><i class="fa-solid fa-chalkboard-user"></i></div>
          <div class="sk-text"><div class="sk-lbl">Teaches</div><div class="sk-val">${esc(data.teachSkill)}</div></div>
        </div>
        <div class="ck-sk">
          <div class="sk-ico w"><i class="fa-solid fa-seedling"></i></div>
          <div class="sk-text"><div class="sk-lbl">Wants</div><div class="sk-val">${esc(data.learnSkill)}</div></div>
        </div>
      </div>
      <div class="ck-desc${desc?'':' no-desc'}">${desc?esc(desc):'No description added.'}</div>
      <div class="ck-meta">
        <span><i class="fa-regular fa-eye"></i>${views} views</span>
        <span><i class="fa-regular fa-clock"></i>${ago(data.createdAt)}</span>
      </div>
      <div class="ck-foot">${foot}</div>`;
    g.appendChild(el);
  });
}

/* ── firebase load ── */
function loadEx(){
  onSnapshot(query(collection(db,'skillExchanges'),orderBy('createdAt','desc')),snap=>{
    allEx=snap.docs.map(d=>({id:d.id,...d.data()})); renderNow();
  });
}
function loadReqs(){
  onSnapshot(query(collection(db,'tradeRequests'),where('ownerId','==',me.uid),where('status','==','pending')),snap=>{
    const n=snap.size;
    document.getElementById('bellDot').classList.toggle('on',n>0);
    document.getElementById('bnBadge').classList.toggle('on',n>0);
  });
}

/* ── post ── */
window.postExchange=async()=>{
  const teach=document.getElementById('teachSkill').value.trim();
  const learn=document.getElementById('learnSkill').value.trim();
  const level=document.getElementById('level').value;
  const desc=document.getElementById('description').value.trim();
  if(!teach||!learn){toast('Fill in both skills!','err');return;}
  try{
    await addDoc(collection(db,'skillExchanges'),{
      userId:me.uid,userName:me.displayName||'User',
      teachSkill:teach,learnSkill:learn,level,description:desc,createdAt:new Date()
    });
    ['teachSkill','learnSkill','description'].forEach(id=>document.getElementById(id).value='');
    toggleForm(); toast('Posted! 🚀','ok'); setTimeout(()=>setTab('mine'),400);
  }catch(e){toast('Error posting.','err');}
};

/* ── request trade ── */
window.reqTrade=async(exId,ownerId)=>{
  if(ownerId===me.uid){toast("Can't trade with yourself!",'err');return;}
  try{
    const dup=await getDocs(query(collection(db,'tradeRequests'),
      where('exchangeId','==',exId),where('requesterId','==',me.uid)));
    if(!dup.empty){toast('Request already sent!','inf');return;}
    await addDoc(collection(db,'tradeRequests'),{
      exchangeId:exId,ownerId,requesterId:me.uid,
      requesterName:me.displayName||'User',status:'pending',createdAt:new Date()
    });
    toast('Request sent! 🤝','ok');
  }catch(e){toast('Failed to send.','err');}
};

/* ── save ── */
window.toggleSave=(id,btn)=>{
  if(saved.has(id)){
    saved.delete(id); btn.classList.remove('on');
    btn.innerHTML='<i class="fa-regular fa-bookmark"></i>';
    btn.closest('.xcard').classList.remove('saved');
    toast('Removed','inf');
  } else {
    saved.add(id); btn.classList.add('on');
    btn.innerHTML='<i class="fa-solid fa-bookmark"></i>';
    btn.closest('.xcard').classList.add('saved');
    toast('Saved! 🔖','ok');
  }
  localStorage.setItem('ss_saved',JSON.stringify([...saved]));
  document.getElementById('sSav').textContent=saved.size;
};

/* ── profile sheet ── */
window.openProfile=(id)=>{
  profEx=allEx.find(e=>e.id===id); if(!profEx)return;
  const[fg,bg]=pal(profEx.userName);
  const av=document.getElementById('pv-av');
  av.style.background=`linear-gradient(135deg,${fg},${bg})`;
  av.textContent=(profEx.userName||'U')[0].toUpperCase();
  document.getElementById('pv-name').textContent=profEx.userName||'User';
  document.getElementById('pv-meta').textContent=(profEx.level||'Beginner')+' · '+ago(profEx.createdAt);
  document.getElementById('pv-teach').textContent=profEx.teachSkill||'—';
  document.getElementById('pv-learn').textContent=profEx.learnSkill||'—';
  document.getElementById('pv-desc').textContent=profEx.description||'No description provided.';
  document.getElementById('profSheet').classList.add('open');
};
window.profileReq=()=>{ if(!profEx)return; closeSheet('profSheet'); reqTrade(profEx.id,profEx.userId); };

/* ── edit ── */
window.openEdit=(id)=>{
  const ex=allEx.find(e=>e.id===id); if(!ex)return;
  editId=id;
  document.getElementById('e-teach').value=ex.teachSkill||'';
  document.getElementById('e-learn').value=ex.learnSkill||'';
  document.getElementById('e-desc').value=ex.description||'';
  document.getElementById('e-level').value=ex.level||'Beginner';
  document.getElementById('editSheet').classList.add('open');
};
window.saveEdit=async()=>{
  if(!editId)return;
  const teach=document.getElementById('e-teach').value.trim();
  const learn=document.getElementById('e-learn').value.trim();
  if(!teach||!learn){toast('Both fields required.','err');return;}
  try{
    await updateDoc(doc(db,'skillExchanges',editId),{
      teachSkill:teach,learnSkill:learn,
      description:document.getElementById('e-desc').value.trim(),
      level:document.getElementById('e-level').value,
    });
    closeSheet('editSheet'); toast('Updated ✅','ok');
  }catch(e){toast('Update failed.','err');}
};

/* ── delete ── */
window.delPost=async(id)=>{
  if(!confirm('Delete this post permanently?'))return;
  try{ await deleteDoc(doc(db,'skillExchanges',id)); toast('Deleted.','inf'); }
  catch(e){toast('Delete failed.','err');}
};

/* ── sheets ── */
window.closeSheet=(id)=>document.getElementById(id).classList.remove('open');
window.sheetClose=(e,id)=>{ if(e.target===document.getElementById(id)) closeSheet(id); };

/* ── toast ── */
let _tt;
function toast(msg,type='ok'){
  clearTimeout(_tt);
  const icons={ok:'<i class="fa-solid fa-check"></i>',err:'<i class="fa-solid fa-xmark"></i>',inf:'<i class="fa-solid fa-info"></i>'};
  document.getElementById('tMsg').textContent=msg;
  const ic=document.getElementById('tIco');
  ic.className='t-ico '+(type==='err'?'t-err':type==='inf'?'t-inf':'t-ok');
  ic.innerHTML=icons[type]||icons.ok;
  document.getElementById('toast').classList.add('on');
  _tt=setTimeout(()=>document.getElementById('toast').classList.remove('on'),3000);
}
window.toast=toast;

/* ── auth ── */
onAuthStateChanged(auth,user=>{
  if(!user){window.location.href='login.html';return;}
  me=user;
  const nm=user.displayName||'User';
  const ud=document.getElementById('userDot');
  ud.textContent=nm[0].toUpperCase();
  const[fg,bg]=pal(nm);
  ud.style.background=`linear-gradient(135deg,${fg},${bg})`;
  onSnapshot(doc(db,'users',user.uid),snap=>{ /* xp available */ });
  loadEx(); loadReqs();
});
</script>
</body>
