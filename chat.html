<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Messages — SkillSwap</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── RESET & VARS ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b; --bg2:#0f0f11; --bg3:#18181b;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --primary:#6366f1; --primary-dim:rgba(99,102,241,0.12); --primary-glow:rgba(99,102,241,0.25);
  --accent:#a855f7;
  --sent:#6366f1; --recv:#27272a;
  --text:#ffffff; --muted:#71717a; --muted2:#a1a1aa;
  --success:#10b981;
  --sab:env(safe-area-inset-bottom,0px);
  --sat:env(safe-area-inset-top,0px);
  --sidebar-w:320px;
}

html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;}

/* ── LAYOUT ── */
.app{display:flex;height:100%;height:100dvh;position:relative;}

/* ── SIDEBAR (contact list) ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg2);
  border-right:1px solid var(--border);
  height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:100;
}

/* Sidebar header */
.sidebar-head{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sidebar-head-left{display:flex;align-items:center;gap:10px;}
.sidebar-logo{
  font-size:1.1rem;font-weight:700;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.head-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);background:var(--primary-dim);
  color:var(--primary);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;transition:.2s;flex-shrink:0;
}
.head-btn:hover{background:rgba(99,102,241,0.22);}

/* Search */
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-inner{
  display:flex;align-items:center;gap:9px;
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:9px 14px;transition:.2s;
}
.search-inner:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.search-inner i{color:var(--muted);font-size:0.85rem;flex-shrink:0;}
.search-inner input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;width:100%;
}
.search-inner input::placeholder{color:var(--muted);}

/* Chat list */
.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-list::-webkit-scrollbar{width:4px;}
.chat-list::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px;}

/* Chat item */
.chat-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 10px;border-radius:14px;cursor:pointer;
  transition:.2s;margin-bottom:2px;border:1px solid transparent;
  position:relative;
}
.chat-item:hover{background:rgba(255,255,255,0.04);}
.chat-item.active{background:var(--primary-dim);border-color:rgba(99,102,241,0.2);}

.ci-avatar{
  width:46px;height:46px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1.1rem;color:white;
  overflow:hidden;position:relative;
}
.ci-avatar img{width:100%;height:100%;object-fit:cover;}
.ci-online{
  position:absolute;bottom:2px;right:2px;
  width:10px;height:10px;border-radius:50%;
  background:var(--success);border:2px solid var(--bg2);
}

.ci-body{flex:1;min-width:0;}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ci-name{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-time{font-size:0.68rem;color:var(--muted);flex-shrink:0;margin-left:6px;}
.ci-last{font-size:0.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-badge{
  min-width:18px;height:18px;border-radius:9px;
  background:var(--primary);color:white;font-size:0.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  flex-shrink:0;margin-left:6px;
}

/* New Chat button at bottom of sidebar */
.new-chat-btn{
  margin:10px 14px;padding:12px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.88rem;font-weight:600;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-shrink:0;
}
.new-chat-btn:hover{opacity:.9;transform:translateY(-1px);}

/* ── MAIN CHAT AREA ── */
.chat-main{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);min-width:0;height:100%;
}

/* Chat header */
.chat-header{
  height:64px;flex-shrink:0;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  background:rgba(9,9,11,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:12px;
}
.mob-back{
  width:44px;height:44px;border-radius:12px;
  background:var(--primary-dim);border:1px solid rgba(99,102,241,0.25);
  color:var(--primary);display:none;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:1.1rem;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.ch-avatar{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1rem;color:white;overflow:hidden;
}
.ch-avatar img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:0.95rem;font-weight:700;}
.ch-status{font-size:0.75rem;color:var(--success);display:flex;align-items:center;gap:5px;margin-top:1px;}
.ch-status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0;}
.ch-actions{display:flex;gap:8px;}
.ch-act-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.85rem;transition:.2s;text-decoration:none;
}
.ch-act-btn:hover{background:rgba(255,255,255,0.09);color:var(--text);}

/* Messages area */
.messages-area{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px;}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--muted);gap:12px;text-align:center;padding:40px;
}
.empty-state .ei{font-size:3rem;color:#3f3f46;}
.empty-state h3{font-size:1.1rem;color:var(--muted2);}
.empty-state p{font-size:0.85rem;}

/* Date separator */
.date-sep{
  text-align:center;padding:10px 0;font-size:0.72rem;color:var(--muted);
  display:flex;align-items:center;gap:10px;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* Bubbles */
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px;animation:fadeUp .25s ease;}
.msg-row.sent{flex-direction:row-reverse;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.bubble{
  max-width:68%;padding:11px 14px;border-radius:18px;
  font-size:0.9rem;line-height:1.55;word-wrap:break-word;position:relative;
}
.bubble.recv{background:var(--recv);color:#e4e4e7;border-bottom-left-radius:4px;}
.bubble.sent{background:var(--sent);color:white;border-bottom-right-radius:4px;}
.bubble-time{font-size:0.63rem;opacity:.65;margin-top:3px;text-align:right;}

.row-av{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:white;
}

/* Typing indicator */
.typing-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.typing-bubble{
  padding:10px 14px;background:var(--recv);border-radius:18px;
  border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center;
}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#71717a;animation:ty 1.4s infinite ease-in-out;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes ty{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-5px);opacity:1}}

/* Video invite card */
.invite-card{
  max-width:72%;padding:14px 16px;
  background:rgba(99,102,241,0.08);
  border:1px solid rgba(99,102,241,0.25);
  border-radius:16px;
}
.msg-row.sent .invite-card{border-bottom-right-radius:4px;}
.msg-row.recv .invite-card{border-bottom-left-radius:4px;}
.ic-title{font-size:0.85rem;font-weight:700;color:#818cf8;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.ic-body{font-size:0.8rem;color:var(--muted2);margin-bottom:10px;}
.ic-join{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;border-radius:10px;background:var(--primary);
  color:white;font-size:0.82rem;font-weight:600;cursor:pointer;
  border:none;font-family:'Plus Jakarta Sans',sans-serif;
  text-decoration:none;transition:.2s;width:100%;
}
.ic-join:hover{opacity:.88;}

/* ── INPUT AREA ── */
.input-area{
  padding:14px 18px;
  padding-bottom:calc(14px + var(--sab));
  border-top:1px solid var(--border);
  background:var(--bg2);
  display:flex;align-items:flex-end;gap:10px;
  flex-shrink:0;
}
.input-wrap{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;display:flex;align-items:center;gap:8px;
  padding:4px 14px;transition:.2s;
}
.input-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.input-wrap textarea{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;
  resize:none;line-height:1.5;max-height:120px;padding:10px 0;
  scrollbar-width:none;
}
.input-wrap textarea::-webkit-scrollbar{display:none;}
.input-wrap textarea::placeholder{color:var(--muted);}
.input-attach{
  color:var(--muted);font-size:0.95rem;cursor:pointer;padding:4px;
  transition:.2s;flex-shrink:0;
}
.input-attach:hover{color:var(--primary);}
.btn-send{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  border:none;background:var(--primary);color:white;
  font-size:1rem;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px var(--primary-glow);
}
.btn-send:hover{background:#4f46e5;transform:scale(1.05);}
.btn-send:active{transform:scale(.95);}

/* ── NO CHAT SELECTED (desktop placeholder) ── */
.no-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--muted);gap:14px;text-align:center;
  background:var(--bg);
}
.no-chat .nc-icon{
  width:80px;height:80px;border-radius:22px;
  background:var(--primary-dim);border:1px solid rgba(99,102,241,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:var(--primary);margin-bottom:8px;
}
.no-chat h3{font-size:1.2rem;font-weight:700;color:var(--muted2);}
.no-chat p{font-size:0.85rem;max-width:260px;}

/* ── NEW CHAT MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  z-index:900;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{
  background:#13131a;border:1px solid var(--border);
  border-radius:24px 24px 0 0;padding:28px 22px;
  width:100%;max-width:500px;
  transform:translateY(60px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  max-height:80vh;display:flex;flex-direction:column;
}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-head h3{font-size:1.1rem;font-weight:700;}
.modal-close{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:.2s;}
.modal-close:hover{background:rgba(255,255,255,0.12);}
.modal-search{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
}
.modal-search input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;width:100%;
}
.modal-search input::placeholder{color:var(--muted);}
.user-list{overflow-y:auto;flex:1;}
.user-list::-webkit-scrollbar{width:4px;}
.user-list::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px;}
.user-row{
  display:flex;align-items:center;gap:12px;padding:12px 10px;
  border-radius:12px;cursor:pointer;transition:.2s;
}
.user-row:hover{background:rgba(255,255,255,0.05);}
.ur-av{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:white;font-size:1rem;overflow:hidden;
}
.ur-av img{width:100%;height:100%;object-fit:cover;}
.ur-info h4{font-size:0.9rem;font-weight:600;}
.ur-info p{font-size:0.78rem;color:var(--muted);}
.ur-btn{
  margin-left:auto;padding:7px 14px;border-radius:9px;
  background:var(--primary-dim);border:1px solid rgba(99,102,241,0.3);
  color:var(--primary);font-size:0.78rem;font-weight:600;cursor:pointer;
  flex-shrink:0;transition:.2s;
}
.ur-btn:hover{background:rgba(99,102,241,0.22);}

/* ── MOBILE OVERLAY for sidebar ── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);z-index:99;
}
.sidebar-overlay.show{display:block;}

/* ── RESPONSIVE ── */
@media (max-width:768px){
  /* Both panels are full-screen; slide one in, one out */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:100% !important;
    transform:translateX(0); /* contacts visible by default */
    z-index:200;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.chat-open{ transform:translateX(-100%); } /* slide away when chat open */

  .chat-main{
    position:fixed;top:0;left:0;right:0;bottom:0;
    z-index:150;
    display:flex;
    transform:translateX(100%); /* off-screen right by default */
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .chat-main.chat-open{ transform:translateX(0); } /* slide in when chat open */

  .mob-back{ display:flex !important; } /* always visible on mobile */

  .messages-area{padding:14px;}
  .bubble{max-width:82%;}
  .input-area{padding:10px 12px;padding-bottom:calc(10px + var(--sab));}
  .modal-box{border-radius:20px 20px 0 0;padding:22px 16px;}
}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:#1a1a2a;border:1px solid var(--border);border-radius:12px;
  padding:11px 20px;color:white;font-size:0.85rem;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);white-space:nowrap;
  animation:toastIn .3s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar mob-list-active" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-head-left">
        <div class="sidebar-logo">⚡ Messages</div>
      </div>
      <div style="display:flex;gap:8px;">
        <div class="head-btn" onclick="openNewChatModal()" title="New Chat">
          <i class="fa-solid fa-pencil"></i>
        </div>
        <a class="head-btn" href="dashboard.html" title="Back to Dashboard" style="color:var(--muted);">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-inner">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search conversations…" id="searchInput" oninput="filterChats(this.value)">
      </div>
    </div>

    <div class="chat-list" id="chatList">
      <div style="padding:40px 20px;text-align:center;color:var(--muted);">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size:1.5rem;margin-bottom:12px;display:block;"></i>
        <p style="font-size:0.88rem;">Loading conversations…</p>
      </div>
    </div>

    <button class="new-chat-btn" onclick="openNewChatModal()">
      <i class="fa-solid fa-plus"></i> New Conversation
    </button>
  </aside>

  <!-- ── MAIN CHAT ── -->
  <div class="chat-main" id="chatMain">

    <!-- Header -->
    <div class="chat-header">
      <button class="mob-back" id="mobBack" onclick="showSidebar()" aria-label="Back to chats">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="ch-avatar" id="headerAvatar">
        <i class="fa-solid fa-user" style="font-size:1rem;"></i>
      </div>
      <div class="ch-info">
        <div class="ch-name" id="headerName">Select a conversation</div>
        <div class="ch-status" id="headerStatus" style="display:none;">
          <span class="ch-status-dot"></span> Online
        </div>
      </div>
      <div class="ch-actions">
        <a class="ch-act-btn" id="videoCallBtn" href="#" title="Video Call" onclick="return startVideoCall()">
          <i class="fa-solid fa-video"></i>
        </a>
        <div class="ch-act-btn" title="More" onclick="showToast('Coming soon')">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
      <div class="no-chat">
        <div class="nc-icon"><i class="fa-regular fa-comments"></i></div>
        <h3>Your Messages</h3>
        <p>Select a conversation from the list or start a new one</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <i class="fa-solid fa-paperclip input-attach" onclick="showToast('File upload coming soon')"></i>
        <textarea id="messageInput" placeholder="Type a message…" rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="btn-send" onclick="sendMessage()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

</div>

<!-- ── NEW CHAT MODAL ── -->
<div class="modal-overlay" id="newChatModal" onclick="if(event.target===this)closeNewChatModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Start a Conversation</h3>
      <div class="modal-close" onclick="closeNewChatModal()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="modal-search">
      <i class="fa-solid fa-magnifying-glass" style="color:var(--muted);"></i>
      <input type="text" placeholder="Search users by name…" id="userSearchInput" oninput="searchUsers(this.value)">
    </div>
    <div class="user-list" id="userList">
      <div style="padding:30px;text-align:center;color:var(--muted);font-size:0.88rem;">
        Type a name to search for users
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  orderBy, onSnapshot, doc, getDoc, serverTimestamp, updateDoc,
  setDoc, limit, startAt, endAt
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCz52XxqRB2IKCxwqm5duKJsQ2uEMs8ans",
  authDomain: "skillswapp-35e86.firebaseapp.com",
  projectId: "skillswapp-35e86",
  storageBucket: "skillswapp-35e86.appspot.com",
  messagingSenderId: "668466292157",
  appId: "1:668466292157:web:9be85414fc752b67779ed4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let activeChatId = null;
let activePartner = null;
let msgUnsubscribe = null;
let allChats = [];

// ── Auth
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;
  await loadChats();
  // On mobile: show sidebar by default
  if (window.innerWidth <= 768) {
    showSidebar();
  }
});

// ── Load chats
async function loadChats() {
  const chatList = document.getElementById("chatList");
  try {
    let q = query(collection(db,"chats"), where("participants","array-contains",currentUser.uid));
    let snap = await getDocs(q);
    if (snap.empty) {
      q = query(collection(db,"chats"), where("users","array-contains",currentUser.uid));
      snap = await getDocs(q);
    }
    if (snap.empty) {
      chatList.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--muted);">
        <i class="fa-solid fa-inbox" style="font-size:2.2rem;margin-bottom:12px;display:block;opacity:.4;"></i>
        <p style="font-size:0.9rem;font-weight:600;">No conversations yet</p>
        <p style="font-size:0.8rem;margin-top:6px;opacity:.7;">Tap "New Conversation" to start chatting</p>
      </div>`;
      return;
    }
    await renderChatList(snap.docs);
  } catch (err) {
    console.error(err);
    chatList.innerHTML = `<div style="padding:30px;text-align:center;color:#ef4444;font-size:0.85rem;">Failed to load chats</div>`;
  }
}

async function renderChatList(docs) {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";
  allChats = [];

  const items = await Promise.all(docs.map(async docSnap => {
    const data = docSnap.data();
    const users = data.participants || data.users || [];
    const otherId = users.find(u => u !== currentUser.uid);
    if (!otherId) return null;

    let name = "User", photo = null, email = "";
    try {
      const uSnap = await getDoc(doc(db,"users",otherId));
      if (uSnap.exists()) {
        const u = uSnap.data();
        name = u.name || u.displayName || "User";
        photo = u.photo || u.photoURL || null;
        email = u.email || "";
      }
    } catch(e) {}

    let lastMsg = "No messages yet", lastTime = null;
    try {
      const mq = query(collection(db,"chats",docSnap.id,"messages"), orderBy("createdAt","desc"), limit(1));
      const ms = await getDocs(mq);
      if (!ms.empty) {
        const m = ms.docs[0].data();
        lastMsg = m.text || "📎 Attachment";
        lastTime = m.createdAt?.toDate();
      }
    } catch(e) {}

    return { chatId: docSnap.id, name, photo, email, lastMsg, lastTime, otherId };
  }));

  const sorted = items.filter(Boolean).sort((a,b) => {
    return (b.lastTime?.getTime()||0) - (a.lastTime?.getTime()||0);
  });

  allChats = sorted;
  renderChatItems(sorted);
}

function renderChatItems(items) {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";
  if (!items.length) {
    chatList.innerHTML = `<div style="padding:30px 20px;text-align:center;color:var(--muted);font-size:0.85rem;">No conversations found</div>`;
    return;
  }
  items.forEach(item => {
    const { chatId, name, photo, lastMsg, lastTime } = item;
    const initials = name.charAt(0).toUpperCase();
    const timeStr = formatTime(lastTime);
    const isActive = chatId === activeChatId;

    const div = document.createElement("div");
    div.className = "chat-item" + (isActive ? " active" : "");
    div.dataset.chatId = chatId;
    div.onclick = () => openChat(item);

    div.innerHTML = `
      <div class="ci-avatar">
        ${photo ? `<img src="${photo}" alt="${initials}">` : initials}
        <span class="ci-online"></span>
      </div>
      <div class="ci-body">
        <div class="ci-top">
          <span class="ci-name">${esc(name)}</span>
          <span class="ci-time">${timeStr}</span>
        </div>
        <span class="ci-last">${esc(lastMsg)}</span>
      </div>`;
    chatList.appendChild(div);
  });
}

// ── Open Chat
function openChat(item) {
  const { chatId, name, photo, otherId } = item;
  activeChatId = chatId;
  activePartner = item;

  // Update header
  document.getElementById("headerName").textContent = name;
  document.getElementById("headerStatus").style.display = "flex";
  const hav = document.getElementById("headerAvatar");
  hav.innerHTML = photo ? `<img src="${photo}" alt="${name}">` : name.charAt(0).toUpperCase();

  // Mark active
  document.querySelectorAll(".chat-item").forEach(el => {
    el.classList.toggle("active", el.dataset.chatId === chatId);
  });

  // On mobile: slide chat in, sidebar out
  if (window.innerWidth <= 768) {
    document.getElementById("sidebar").classList.add("chat-open");
    document.getElementById("chatMain").classList.add("chat-open");
  }

  // Load messages
  const area = document.getElementById("messagesArea");
  area.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);">
    <i class="fa-solid fa-circle-notch fa-spin"></i>
  </div>`;

  if (msgUnsubscribe) msgUnsubscribe();

  const q = query(collection(db,"chats",chatId,"messages"), orderBy("createdAt"));
  msgUnsubscribe = onSnapshot(q, snap => {
    area.innerHTML = "";
    if (snap.empty) {
      area.innerHTML = `<div class="empty-state">
        <i class="fa-regular fa-message ei"></i>
        <h3>No messages yet</h3>
        <p>Say hello! 👋</p>
      </div>`;
      return;
    }

    let lastDate = null;
    snap.forEach(d => {
      const msg = d.data();
      const msgDate = msg.createdAt?.toDate();
      const isSent = msg.senderId === currentUser.uid;

      if (msgDate) {
        const ds = msgDate.toLocaleDateString([], {weekday:'long',month:'long',day:'numeric'});
        if (ds !== lastDate) {
          lastDate = ds;
          const sep = document.createElement("div");
          sep.className = "date-sep";
          sep.textContent = ds;
          area.appendChild(sep);
        }
      }

      const timeStr = msgDate ? msgDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';

      if (msg.type === 'video_invite') {
        const row = document.createElement("div");
        row.className = `msg-row ${isSent ? 'sent' : 'recv'}`;
        row.innerHTML = `<div class="invite-card">
          <div class="ic-title"><i class="fa-solid fa-video"></i> Live Session Invite</div>
          <div class="ic-body">${isSent ? 'You sent' : esc(name)+' sent'} a video session invite.</div>
          ${!isSent
            ? `<a class="ic-join" href="video-room.html?room=${esc(msg.roomId||'')}"><i class="fa-solid fa-video"></i> Join Now</a>`
            : `<div style="font-size:0.78rem;color:var(--muted);font-style:italic;">⏳ Waiting for them…</div>`}
          <div class="bubble-time">${timeStr}</div>
        </div>`;
        area.appendChild(row);
        return;
      }

      const row = document.createElement("div");
      row.className = `msg-row ${isSent ? 'sent' : 'recv'}`;
      row.innerHTML = `
        ${!isSent ? `<div class="row-av">${name.charAt(0)}</div>` : ''}
        <div class="bubble ${isSent ? 'sent' : 'recv'}">
          ${esc(msg.text)}
          <div class="bubble-time">${timeStr}</div>
        </div>`;
      area.appendChild(row);
    });

    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 80);
  });
}

// ── Send
window.sendMessage = async function() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text || !activeChatId) return;

  input.value = "";
  input.style.height = "";

  try {
    await addDoc(collection(db,"chats",activeChatId,"messages"), {
      text, senderId: currentUser.uid, createdAt: serverTimestamp()
    });
    await updateDoc(doc(db,"chats",activeChatId), { lastActivity: serverTimestamp() });
  } catch(e) {
    console.error(e);
    showToast("Failed to send");
  }
};

// ── Video call
window.startVideoCall = function() {
  if (!activeChatId) { showToast("Select a chat first"); return false; }
  const roomId = Math.random().toString(36).substr(2,9).toUpperCase();
  addDoc(collection(db,"chats",activeChatId,"messages"), {
    type: 'video_invite',
    roomId,
    senderId: currentUser.uid,
    createdAt: serverTimestamp()
  });
  window.open(`video-room.html?room=${roomId}`, '_blank');
  return false;
};

// ── New Chat Modal — search users
let searchTimeout;
window.searchUsers = function(val) {
  clearTimeout(searchTimeout);
  const ul = document.getElementById("userList");
  if (!val.trim()) {
    ul.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.88rem;">Type a name to search</div>`;
    return;
  }
  ul.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);"><i class="fa-solid fa-circle-notch fa-spin"></i></div>`;
  searchTimeout = setTimeout(async () => {
    try {
      const q = query(
        collection(db,"users"),
        orderBy("name"),
        startAt(val),
        endAt(val + "\uf8ff"),
        limit(20)
      );
      const snap = await getDocs(q);
      if (snap.empty) {
        ul.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.85rem;">No users found for "${esc(val)}"</div>`;
        return;
      }
      ul.innerHTML = "";
      snap.forEach(d => {
        if (d.id === currentUser.uid) return;
        const u = d.data();
        const n = u.name || u.displayName || "User";
        const ph = u.photo || u.photoURL || null;
        const row = document.createElement("div");
        row.className = "user-row";
        row.innerHTML = `
          <div class="ur-av">${ph ? `<img src="${ph}">` : n.charAt(0).toUpperCase()}</div>
          <div class="ur-info"><h4>${esc(n)}</h4><p>${esc(u.email||'')}</p></div>
          <button class="ur-btn" onclick="startChatWith('${d.id}','${esc(n)}','${ph||''}')">Message</button>`;
        ul.appendChild(row);
      });
    } catch(e) {
      console.error(e);
      ul.innerHTML = `<div style="padding:20px;text-align:center;color:#ef4444;font-size:0.85rem;">Search failed</div>`;
    }
  }, 400);
};

window.startChatWith = async function(uid, name, photo) {
  closeNewChatModal();
  // Check if chat already exists
  let chatId = null;
  try {
    const q = query(collection(db,"chats"), where("participants","array-contains",currentUser.uid));
    const snap = await getDocs(q);
    snap.forEach(d => {
      const p = d.data().participants || d.data().users || [];
      if (p.includes(uid)) chatId = d.id;
    });
  } catch(e){}

  if (!chatId) {
    const ref = await addDoc(collection(db,"chats"), {
      participants: [currentUser.uid, uid],
      createdAt: serverTimestamp(),
      lastActivity: serverTimestamp()
    });
    chatId = ref.id;
  }

  await loadChats();
  // Open the chat
  openChat({ chatId, name, photo, otherId: uid, lastMsg:'', lastTime:null });
};

// ── Filter chats search
window.filterChats = function(val) {
  if (!val.trim()) { renderChatItems(allChats); return; }
  const filtered = allChats.filter(c => c.name.toLowerCase().includes(val.toLowerCase()));
  renderChatItems(filtered);
};

function formatTime(date) {
  if (!date) return '';
  const now = new Date();
  const diff = Math.floor((now - date) / 86400000);
  if (diff === 0) return date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (diff === 1) return 'Yesterday';
  return date.toLocaleDateString([],{month:'short',day:'numeric'});
}

function esc(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

window.showToast = function(msg) {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2800);
};
</script>

<script>
// ── Mobile nav helpers (non-module)
window.showSidebar = function() {
  document.getElementById("sidebar").classList.remove("chat-open");
  document.getElementById("chatMain").classList.remove("chat-open");
};
window.closeSidebar = function() {
  document.getElementById("sidebarOverlay").classList.remove("show");
};

// ── Modal
window.openNewChatModal = function() {
  document.getElementById("newChatModal").classList.add("show");
  setTimeout(() => document.getElementById("userSearchInput").focus(), 300);
};
window.closeNewChatModal = function() {
  document.getElementById("newChatModal").classList.remove("show");
  document.getElementById("userSearchInput").value = "";
  document.getElementById("userList").innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.88rem;">Type a name to search</div>`;
};

// ── Textarea auto-resize
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── Enter to send (Shift+Enter = new line)
window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    window.sendMessage && sendMessage();
  }
};

// ── Init: on desktop always show both panels
// On mobile: sidebar shows by default (chat-open class not set)
// CSS handles everything via transform
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    const sb = document.getElementById("sidebar");
    const cm = document.getElementById("chatMain");
    sb.classList.remove("chat-open");
    cm.classList.remove("chat-open");
    sb.style.transform = "";
    cm.style.transform = "";
    cm.style.display = "flex";
  }
});

// ── Swipe right to go back (mobile gesture)
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  // Swipe right from left edge = go back to contacts
  if (dx > 80 && touchStartX < 40 && window.innerWidth <= 768) {
    window.showSidebar && showSidebar();
  }
}, {passive:true});
</script>
