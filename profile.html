<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - SkillSwap</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg-dark:#09090b;--card-bg:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.08);--primary:#6366f1;--primary-glow:rgba(99,102,241,0.3);--accent:#a855f7;--success:#10b981;--text-main:#ffffff;--text-muted:#a1a1aa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-dark);color:var(--text-main);min-height:100vh;background-image:radial-gradient(circle at 10% 20%,rgba(99,102,241,0.1) 0%,transparent 20%),radial-gradient(circle at 90% 80%,rgba(168,85,247,0.1) 0%,transparent 20%);}
.container{max-width:700px;margin:0 auto;padding:40px 20px;}
.profile-header{display:flex;align-items:center;gap:20px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:24px;padding:28px;margin-bottom:24px;backdrop-filter:blur(10px);position:relative;overflow:hidden;}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar-img{width:90px;height:90px;border-radius:50%;border:3px solid transparent;background:linear-gradient(var(--bg-dark),var(--bg-dark)) padding-box,linear-gradient(135deg,var(--primary),var(--accent)) border-box;object-fit:cover;}
.avatar-fallback{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:white;}
.profile-info h2{font-size:1.4rem;font-weight:700;margin-bottom:4px;}
.profile-info p{color:var(--text-muted);font-size:0.9rem;}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-top:8px;}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:24px;margin-bottom:20px;backdrop-filter:blur(10px);}
.card-title{font-size:1rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:white;}
.card-title i{color:var(--primary);}
.input-group{margin-bottom:16px;}
.input-group label{display:block;font-size:0.82rem;color:var(--text-muted);margin-bottom:7px;font-weight:500;}
.input-group input{width:100%;padding:13px 16px;background:rgba(0,0,0,0.25);border:1px solid var(--card-border);border-radius:12px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;outline:none;transition:0.2s;}
.input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;font-weight:600;font-size:1rem;cursor:pointer;transition:0.2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px var(--primary-glow);}
.skills-tags{display:flex;flex-wrap:wrap;gap:8px;}
.skill-tag{background:rgba(255,255,255,0.06);border:1px solid var(--card-border);padding:6px 14px;border-radius:20px;font-size:0.82rem;color:var(--text-muted);}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;}
.stat-item{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:14px;padding:16px 8px;}
.stat-item .val{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-item .lbl{font-size:0.72rem;color:var(--text-muted);margin-top:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#18181b;border:1px solid var(--card-border);color:white;padding:12px 22px;border-radius:12px;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
/* BACK BTN */
.mobile-back-btn{display:none;position:fixed;top:16px;left:16px;z-index:9999;width:44px;height:44px;background:rgba(9,9,11,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:1.1rem;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(10px);text-decoration:none;transition:background 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.mobile-back-btn:hover{background:rgba(99,102,241,0.3);}
@media(max-width:768px){
.mobile-back-btn{display:flex;}
.container{padding:70px 16px 30px;}
.profile-header{flex-direction:column;text-align:center;padding:24px 18px;}
.stat-row{grid-template-columns:1fr 1fr 1fr;}
.card{padding:18px 16px;}
}
@media(max-width:400px){
.stat-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<a class="mobile-back-btn" href="dashboard.html" title="Back">&#8592;</a>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrap">
            <img id="photo" class="avatar-img" src="" onerror="this.style.display='none';document.getElementById('avatarFallback').style.display='flex'">
            <div class="avatar-fallback" id="avatarFallback" style="display:none;">U</div>
        </div>
        <div class="profile-info">
            <h2 id="name">Loading...</h2>
            <p id="email">—</p>
            <span class="badge"><i class="fa-solid fa-medal"></i> Beginner</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="stat-row" style="margin-bottom:20px;">
        <div class="stat-item"><div class="val">0</div><div class="lbl">Trades</div></div>
        <div class="stat-item"><div class="val">0</div><div class="lbl">XP</div></div>
        <div class="stat-item"><div class="val">₹0</div><div class="lbl">Earned</div></div>
    </div>

    <!-- Skills -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-code"></i> My Skills</div>
        <div class="skills-tags">
            <span class="skill-tag">Java</span>
            <span class="skill-tag">C++</span>
            <span class="skill-tag">Web Dev</span>
        </div>
    </div>

    <!-- Bank / UPI -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-building-columns"></i> Bank / UPI Details</div>
        <div class="input-group">
            <label>UPI ID</label>
            <input id="upiId" placeholder="example@upi" type="text">
        </div>
        <button class="btn-primary" onclick="saveBank()">
            <i class="fa-solid fa-floppy-disk"></i> Save Details
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCz52XxqRB2IKCxwqm5duKJsQ2uEMs8ans",
  authDomain: "skillswapp-35e86.firebaseapp.com",
  projectId: "skillswapp-35e86",
  storageBucket: "skillswapp-35e86.appspot.com",
  messagingSenderId: "668466292157",
  appId: "1:668466292157:web:9be85414fc752b67779ed4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showToast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2800);
}

onAuthStateChanged(auth, async (user) => {
    if(!user){ window.location.href="login.html"; return; }
    document.getElementById("name").innerText = user.displayName || user.email.split("@")[0];
    document.getElementById("email").innerText = user.email;
    document.getElementById("avatarFallback").innerText = (user.displayName||"U")[0].toUpperCase();
    if(user.photoURL){ document.getElementById("photo").src = user.photoURL; }
    // Load saved UPI
    const bankSnap = await getDoc(doc(db,"bankDetails",user.uid));
    if(bankSnap.exists()){ document.getElementById("upiId").value = bankSnap.data().upiId || ""; }
});

window.saveBank = async function(){
    const user = auth.currentUser;
    const upi = document.getElementById("upiId").value.trim();
    if(!upi){ showToast("Please enter UPI ID"); return; }
    await setDoc(doc(db,"bankDetails",user.uid),{ upiId:upi });
    showToast("✅ Bank details saved!");
};
</script>
</body>
</html>
